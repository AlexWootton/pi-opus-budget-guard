name: publish

on:
  push:
    tags:
      - "v*"

# Permissions:
#  - contents: write → creating a GitHub Release
#  - id-token: write → OIDC token exchange for npm trusted publishing
#                       (also enables npm provenance automatically)
permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          registry-url: "https://registry.npmjs.org"

      # Trusted publishing requires npm >= 11.5.1; the npm shipped with
      # Node LTS is older, so upgrade explicitly.
      - name: Upgrade npm (trusted publishing requires >= 11.5.1)
        run: npm install -g npm@latest

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match package.json version ${PKG_VERSION}"
            exit 1
          fi

      # No NODE_AUTH_TOKEN needed: npm CLI detects the GitHub Actions OIDC
      # token via the id-token: write permission and exchanges it with npm
      # for a one-shot publish credential. Provenance is enabled automatically.
      - name: Publish to npm (trusted publisher)
        run: npm publish --access=public

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            --verify-tag
